name: atelier-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: atelier
      POSTGRES_PASSWORD: atelier
      POSTGRES_DB: atelier
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atelier -d atelier']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  inngest:
    image: inngest/inngest:latest
    # Le worker (Phase 2) exposera son endpoint Inngest sur le port 3111 de l'hôte.
    command:
      [
        'inngest',
        'dev',
        '--no-discovery',
        '-u',
        'http://host.docker.internal:3111/api/inngest',
      ]
    ports:
      - '8288:8288'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'inngest', 'version']
      interval: 5s
      timeout: 5s
      retries: 10

  # Réceptacle SMTP de dev (successeur maintenu de MailHog — voir docs/adr/0001-versions.md).
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # UI web
    healthcheck:
      test: ['CMD', '/mailpit', 'readyz']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  miniodata:
