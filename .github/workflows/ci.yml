name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  # Prouve le critère d'acceptation Phase 0 : migrate up -> down -> up sans erreur.
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: atelier
          POSTGRES_PASSWORD: atelier
          POSTGRES_DB: atelier
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atelier -d atelier"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://atelier:atelier@localhost:5432/atelier
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: migrate up
        run: pnpm db:migrate
      - name: down puis up (reset + réapplication)
        run: pnpm db:reset
      - name: up idempotent (aucune migration restante)
        run: pnpm db:migrate
