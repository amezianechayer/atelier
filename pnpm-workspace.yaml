# templates/ est volontairement exclu : ce sont des gabarits copiés dans les
# ventures des utilisateurs, pas des packages du workspace.
packages:
  - apps/*
  - packages/*
allowBuilds:
  # Fallback pur JS suffisant ; on évite node-gyp sur les machines de dev.
  cpu-features: false
  esbuild: true
  protobufjs: false
  sharp: true
  ssh2: false
minimumReleaseAgeExclude:
  - tsx@4.23.1
